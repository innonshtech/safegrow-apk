version: 1
applications:
  - appRoot: apps/admin
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - (cd ../.. && pnpm install)
        build:
          commands:
            - pnpm --filter @safegrow/db generate
            - pnpm run build
            - mkdir -p node_modules
            - cp -rL ../../node_modules/@prisma ./node_modules/ || true
            - cp -rL ../../node_modules/.prisma ./node_modules/ || true
            - cp -rL ../../node_modules/@aws-sdk ./node_modules/ || true
            - cp -rL ../../node_modules/bcrypt ./node_modules/ || true
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - node_modules/**/*
          - .next/cache/**/*
  
  - appRoot: apps/backend
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - (cd ../.. && pnpm install)
        build:
          commands:
            - pnpm --filter @safegrow/db generate
            - pnpm run build
            - mkdir -p node_modules
            - cp -rL ../../node_modules/@prisma ./node_modules/ || true
            - cp -rL ../../node_modules/.prisma ./node_modules/ || true
            - cp -rL ../../node_modules/@aws-sdk ./node_modules/ || true
            - cp -rL ../../node_modules/bcrypt ./node_modules/ || true
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - node_modules/**/*
          - .next/cache/**/*
