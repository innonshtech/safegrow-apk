version: 1
applications:
  - appRoot: apps/backend
    frontend:
      phases:
        preBuild:
          commands:
            # Install pnpm using npm
            - npm install -g pnpm
            # Install dependencies at the root of the monorepo
            - cd ../.. && pnpm install
        build:
          commands:
            # Build the backend specifically
            - cd ../.. && pnpm run build --filter backend
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - node_modules/**/*
          - .next/cache/**/*
